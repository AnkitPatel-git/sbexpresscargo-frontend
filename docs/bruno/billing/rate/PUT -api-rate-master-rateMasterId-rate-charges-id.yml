    data: |-
      {
        "name": "FUEL",
        "calculationBase": "CHARGE_WEIGHT",
        "value": 6,
        "isPercentage": true,
        "minValue": 0,
        "maxValue": 999999,
        "sequence": 1,
        "chargeSlabs": [
          {
            "minValue": 0,
            "maxValue": 1000,
            "rate": 6
          }
