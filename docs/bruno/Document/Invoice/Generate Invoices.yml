info:
  name: Generate Invoices
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/document/invoice/generate"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "year": "2026",
        "fromDate": "2026-03-01",
        "toDate": "2026-03-31",
        "productType": "DOMESTIC",
        "serviceCenterId": 1,
        "billingType": "standard",
        "registerType": "REGISTERED",
        "customerId": 1,
        "showAwb": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{baseUrl}}/document/invoice/generate"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{accessToken}}
      body:
        type: json
        data: |-
          {
            "year": "2026",
            "fromDate": "2026-03-01",
            "toDate": "2026-03-31",
            "productType": "DOMESTIC",
            "serviceCenterId": 1,
            "billingType": "standard",
            "registerType": "REGISTERED",
            "customerId": 1,
            "showAwb": true
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: content-security-policy
          value: "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data:;object-src 'none';script-src 'self';script-src-attr 'none';style-src 'self' https: 'unsafe-inline';upgrade-insecure-requests"
        - name: cross-origin-opener-policy
          value: same-origin
        - name: cross-origin-resource-policy
          value: same-origin
        - name: origin-agent-cluster
          value: ?1
        - name: referrer-policy
          value: no-referrer
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
        - name: x-content-type-options
          value: nosniff
        - name: x-dns-prefetch-control
          value: off
        - name: x-download-options
          value: noopen
        - name: x-frame-options
          value: SAMEORIGIN
        - name: x-permitted-cross-domain-policies
          value: none
        - name: x-xss-protection
          value: "0"
        - name: vary
          value: Origin
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "163"
        - name: etag
          value: W/"a3-hYri7YWVVx5wz+RjHiJ2nHgdndM"
        - name: date
          value: Wed, 25 Mar 2026 02:44:11 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "data": {
              "createdInvoiceId": null,
              "shipmentCount": 0,
              "totals": {
                "baseAmount": 0,
                "fuelAmount": 0,
                "igst": 0,
                "cgst": 0,
                "sgst": 0,
                "grandTotal": 0,
                "awbCount": 0
              }
            }
          }

docs: |-
  Generate invoices: create Invoice records and set Shipment.invoiceNo. JWT + invoice.core.create.

  Mandatory: year, fromDate, toDate
  Optional: productType, serviceCenterId, billingType, registerType, customerId, showAwb
