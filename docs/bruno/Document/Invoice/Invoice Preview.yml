info:
  name: Invoice Preview
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/document/invoice/preview"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "year": "2026",
        "fromDate": "2026-03-01",
        "toDate": "2026-03-31",
        "productType": "DOMESTIC",
        "serviceCenterId": 1,
        "billingType": "standard",
        "registerType": "REGISTERED",
        "customerId": 1,
        "showAwb": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{baseUrl}}/document/invoice/preview"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{accessToken}}
      body:
        type: json
        data: |-
          {
            "year": "2026",
            "fromDate": "2026-03-01",
            "toDate": "2026-03-31",
            "productType": "DOMESTIC",
            "serviceCenterId": 1,
            "billingType": "standard",
            "registerType": "REGISTERED",
            "customerId": 1,
            "showAwb": true
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-security-policy
          value: "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data:;object-src 'none';script-src 'self';script-src-attr 'none';style-src 'self' https: 'unsafe-inline';upgrade-insecure-requests"
        - name: cross-origin-opener-policy
          value: same-origin
        - name: cross-origin-resource-policy
          value: same-origin
        - name: origin-agent-cluster
          value: ?1
        - name: referrer-policy
          value: no-referrer
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
        - name: x-content-type-options
          value: nosniff
        - name: x-dns-prefetch-control
          value: off
        - name: x-download-options
          value: noopen
        - name: x-frame-options
          value: SAMEORIGIN
        - name: x-permitted-cross-domain-policies
          value: none
        - name: x-xss-protection
          value: "0"
        - name: vary
          value: Origin
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "259"
        - name: etag
          value: W/"103-2QTue85ci4amMTkoTw7QhmbVUY0"
        - name: date
          value: Wed, 25 Mar 2026 02:43:53 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "data": {
              "customerId": 1,
              "serviceCenterId": 1,
              "fromDate": "2026-03-01",
              "toDate": "2026-03-31",
              "productType": "DOMESTIC",
              "registerType": "REGISTERED",
              "awbCount": 0,
              "totalAmount": 0,
              "fuelAmount": 0,
              "igst": 0,
              "cgst": 0,
              "sgst": 0,
              "grandTotal": 0,
              "awbLines": []
            }
          }

docs: |-
  Preview invoice aggregation by customer (no persistence). JWT + invoice.core.read.

  Mandatory: year, fromDate, toDate
  Optional: productType (DOMESTIC|INTERNATIONAL), serviceCenterId, billingType, registerType (Registered|Unregistered), customerId, showAwb
