info:
  name: POST /api/utilities/users/change-password
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/api/utilities/users/change-password"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
      disabled: true
  body:
    type: json
    data: |-
      {
        "currentPassword": "string",
        "newPassword": "string"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
