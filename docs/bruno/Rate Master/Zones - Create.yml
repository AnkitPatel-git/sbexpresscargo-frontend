  url: "{{baseUrl}}/rate-master/zones"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name": "Domestic Zone 2",
        "code": "DOM2",
        "country": "India",
        "zoneType": "DOMESTIC"
      }
  auth: inherit

