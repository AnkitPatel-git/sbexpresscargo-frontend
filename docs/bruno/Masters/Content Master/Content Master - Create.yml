docs: |-
  Content Master create. JWT + content_master_add or content_master_all.

  Mandatory: contentName
  Optional: contentCode (if omitted, backend assigns next `CNT` + numeric suffix), hsnCode, vendorId, countryId, additionalField, clearanceCethNo, notificationSubType, notificationSubType1, notificationNo, srNo, igstNotification, igstSrNo, igstcNotification, igstcSrNo. Response includes nested vendor, country, and createdBy (user fields without password).
