info:
  name: Pincode - List
  type: http
  seq: 20

http:
  method: GET
  url: "{{baseUrl}}/pincode?page=1&limit=20&sortBy=pinCode&sortOrder=asc&search="
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Alias endpoint for serviceable pincode listing. JWT + utility.serviceable_pincode.read.
