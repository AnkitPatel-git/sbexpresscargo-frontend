info:
  name: Serviceable Pincodes - Update
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/utilities/serviceable-pincodes/1"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "pinCode": "486001",
        "cityName": "REWA",
        "countryCode": "IN",
        "stateId": 3,
        "zoneId": 1,
        "serviceable": true,
        "oda": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Update a serviceable pincode by id. Domain ownership is under Master module; endpoint path remains `/utilities/serviceable-pincodes` for backward compatibility.
  JWT + serviceable_pincode_modify or serviceable_pincode_all.

  Mandatory: (none - all optional for partial update)
  Optional: pinCode, cityName, countryId, countryCode, stateId, zoneId, serviceable, oda
