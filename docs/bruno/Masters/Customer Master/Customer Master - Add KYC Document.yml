info:
  name: Customer Master - Add KYC Document
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/customer-master/{{customerId}}/kyc-documents"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "docType": "AADHAAR",
        "documentNumber": "123456789012",
        "fileUrl": "https://example.com/kyc/aadhaar.pdf",
        "expiryDate": "2030-01-01",
        "verified": false
      }
  auth: inherit

runtime:
  variables:
    - name: customerId
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

