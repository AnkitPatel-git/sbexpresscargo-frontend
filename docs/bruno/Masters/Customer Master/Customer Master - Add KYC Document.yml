docs: |-
  Add a KYC document to a specific customer. JWT + customer_master_add or customer_master_all.

  Path param: customerId (number) — ID of the customer
  Mandatory: documentType (e.g. AADHAAR, PAN, PASSPORT, GST), documentNumber
  Optional: fileUrl, expiryDate, verified
