docs: |-
  Create a carrier (`carriers` — used for pickup `carrierId`, carrier mappings, webhooks). **Not** `/courier-master`.

  **Body — `CreateCarrierDto` (JSON)**

  | Field     | Required | Type    | Constraints | Notes |
  |-----------|----------|---------|-------------|-------|
  | code      | **yes**  | string  | max 64      | Unique among non-deleted rows |
  | name      | **yes**  | string  | max 255     | Display name |
  | isActive  | no       | boolean | —           | Default **true** if omitted |

  **Minimal body (optional field omitted)**

  ```json
  { "code": "6E", "name": "IndiGo Cargo" }
  ```

  **Full body (all properties)**

  ```json
  { "code": "6E", "name": "IndiGo Cargo", "isActive": true }
  ```

  JWT + `master.carrier.create` (re-seed or assign permissions after deploy)
