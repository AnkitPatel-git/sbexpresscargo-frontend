info:
  name: Carrier Master - Export (CSV)
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/carrier-master/export?page=1&limit=20&sortBy=code&sortOrder=asc&search=&code=&name="
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: page
      value: "1"
      type: query
      description: Page (optional, default 1)
    - name: limit
      value: "20"
      type: query
      description: Page size (optional, default 20, max 100)
    - name: sortBy
      value: code
      type: query
      description: id | code | name | createdAt | isActive
    - name: sortOrder
      value: asc
      type: query
      description: asc | desc
    - name: search
      value: ""
      type: query
      description: Search code + name
    - name: code
      value: ""
      type: query
      description: Contains filter on code
    - name: name
      value: ""
      type: query
      description: Contains filter on name
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{baseUrl}}/carrier-master/export?page=1&limit=20&sortBy=code&sortOrder=asc&search=&code=&name="
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
      params:
        - name: page
          value: "1"
          type: query
          description: Page (optional, default 1)
        - name: limit
          value: "20"
          type: query
          description: Page size (optional, default 20, max 100)
        - name: sortBy
          value: code
          type: query
          description: id | code | name | createdAt | isActive
        - name: sortOrder
          value: asc
          type: query
          description: asc | desc
        - name: search
          value: ""
          type: query
          description: Search code + name
        - name: code
          value: ""
          type: query
          description: Contains filter on code
        - name: name
          value: ""
          type: query
          description: Contains filter on name
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-security-policy
          value: "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data:;object-src 'none';script-src 'self';script-src-attr 'none';style-src 'self' https: 'unsafe-inline';upgrade-insecure-requests"
        - name: cross-origin-opener-policy
          value: same-origin
        - name: cross-origin-resource-policy
          value: same-origin
        - name: origin-agent-cluster
          value: ?1
        - name: referrer-policy
          value: no-referrer
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
        - name: x-content-type-options
          value: nosniff
        - name: x-dns-prefetch-control
          value: off
        - name: x-download-options
          value: noopen
        - name: x-frame-options
          value: SAMEORIGIN
        - name: x-permitted-cross-domain-policies
          value: none
        - name: x-xss-protection
          value: "0"
        - name: vary
          value: Origin
        - name: content-type
          value: text/csv
        - name: content-disposition
          value: attachment; filename="carriers.csv"
        - name: date
          value: Tue, 24 Mar 2026 20:15:31 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
        - name: transfer-encoding
          value: chunked
      body:
        type: text
        data: |
          id,code,name,isActive
          1,BLUEDART,BLUEDART Cargo (updated),true

docs: |-
  Download CSV (`id`, `code`, `name`, `isActive`). Uses the **same query parameters** as **List / Search** (see that request for the full table).

  JWT + `master.carrier.read`
