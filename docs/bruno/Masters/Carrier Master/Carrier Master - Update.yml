docs: |-
  Partial update. Server applies optimistic locking using the current `version` (not sent in body).

  **Path**

  | Segment | Description |
  |---------|-------------|
  | `:id`   | Carrier id to update |

  **Body — `UpdateCarrierDto` (JSON, all optional)**

  | Field     | Required | Type    | Max length | Notes |
  |-----------|----------|---------|------------|-------|
  | code      | no       | string  | 64         | Must stay unique if changed |
  | name      | no       | string  | 255        | |
  | isActive  | no       | boolean | —          | |

  **Examples**

  - Rename only: `{ "name": "New name" }`
  - Deactivate: `{ "isActive": false }`
  - Full patch (below): send every field you want to set.

  JWT + `master.carrier.update`
