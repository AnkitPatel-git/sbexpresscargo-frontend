  Shipper Master create. JWT + shipper_master_add or shipper_master_all.

  Mandatory: shipperName
  Optional: shipperCode (if omitted, backend assigns next `SHP` + numeric suffix), shipperOrigin, contactPerson, address1, address2, pinCodeId, city, state, industry, telephone, fax, email, mobile, iecNo, gstNo, aadhaarNo, panNo, serviceCenter, bankId, bankAccount, bankIfsc, firmType, nfei, lutNumber, lutIssueDate, lutTillDate
