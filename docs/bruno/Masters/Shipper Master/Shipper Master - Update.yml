info:
  name: Shipper Master - Update
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/shipper-master/1"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "shipperCode": "SHIP01",
        "shipperName": "Sender Company Updated",
        "contactPerson": "Updated Contact",
        "address1": "300 Shipment St",
        "address2": "Floor 2",
        "pinCodeId": 1,
        "areaId": 1,
        "telephone": "022-55556666",
        "fax": "022-77778888",
        "email": "sender@company.com",
        "mobile": "9876543212",
        "aadhaarNo": "123456789012",
        "panNo": "AABCU9603R",
        "bankId": 1,
        "bankAccount": "1234567890",
        "bankIfsc": "SBIN0001234",
        "firmType": "GOV",
        "nfei": "NFEI123",
        "lutNumber": "LUT123",
        "lutIssueDate": "2026-01-01",
        "lutTillDate": "2027-01-01"
