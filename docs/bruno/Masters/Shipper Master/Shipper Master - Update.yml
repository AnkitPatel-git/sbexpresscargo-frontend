settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Shipper Master update by id. JWT + shipper_master_modify or shipper_master_all.

  Mandatory: (none - all optional for partial update)
  Optional: shipperOrigin, shipperCode, shipperName, contactPerson, address1, address2, pinCodeId, city, state, industry, telephone, fax, email, mobile, iecNo, gstNo, aadhaarNo, panNo, serviceCenter, bankId, bankAccount, bankIfsc, firmType, nfei, lutNumber, lutIssueDate, lutTillDate
