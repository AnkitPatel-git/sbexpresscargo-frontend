info:
  name: Vendor Master - Export (CSV)
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/vendor-master/export"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/vendor-master/export"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: text/csv
        - name: content-disposition
          value: attachment; filename="vendors.csv"
      body:
        type: text
        data: (empty CSV — no vendor records to export)
  - name: example (1)
    request:
      url: "{{baseUrl}}/vendor-master/export"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-security-policy
          value: "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data:;object-src 'none';script-src 'self';script-src-attr 'none';style-src 'self' https: 'unsafe-inline';upgrade-insecure-requests"
        - name: cross-origin-opener-policy
          value: same-origin
        - name: cross-origin-resource-policy
          value: same-origin
        - name: origin-agent-cluster
          value: ?1
        - name: referrer-policy
          value: no-referrer
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
        - name: x-content-type-options
          value: nosniff
        - name: x-dns-prefetch-control
          value: off
        - name: x-download-options
          value: noopen
        - name: x-frame-options
          value: SAMEORIGIN
        - name: x-permitted-cross-domain-policies
          value: none
        - name: x-xss-protection
          value: "0"
        - name: vary
          value: Origin
        - name: access-control-allow-credentials
          value: "true"
        - name: content-type
          value: text/csv
        - name: content-disposition
          value: attachment; filename="vendors.csv"
        - name: date
          value: Thu, 09 Apr 2026 14:14:20 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
        - name: transfer-encoding
          value: chunked
      body:
        type: text
        data: |
          vendorCode,vendorName,contactPerson,mobile,status
          VEND05,Bluedart,Vendor Contact,9876543213,ACTIVE

docs: |-
  Export all Vendor Master records as a CSV file download. JWT + vendor_master_list or vendor_master_all.

  Response: text/csv download (Content-Disposition: attachment; filename="vendors.csv")
  Optional query params: same filters as the List endpoint (search, sortBy, sortOrder, etc.)
