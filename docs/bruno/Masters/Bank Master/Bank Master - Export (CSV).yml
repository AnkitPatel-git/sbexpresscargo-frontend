info:
  name: Bank Master - Export (CSV)
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/bank-master/export"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/bank-master/export"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: text/csv
        - name: content-disposition
          value: 'attachment; filename="banks.csv"'
      body:
        type: text
        data: "(empty CSV — no bank records to export)"

docs: |-
  Export all Bank Master records as a CSV file download. JWT + bank_master_list or bank_master_all.

  Response: text/csv download (Content-Disposition: attachment; filename="banks.csv")
  Optional query params: same filters as the List endpoint (search, sortBy, sortOrder, etc.)
