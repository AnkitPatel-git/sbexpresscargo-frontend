docs: |-
  List zones (paginated). **URL:** `GET /zone-master` (same data as `GET /rate-master/zones`).

  Query: `page`, `limit`, `sortBy` (`code`|`name`|`id`|`zoneType`), `sortOrder`, `search`, `zoneCode`, `zoneName`, `zoneType`, `exportType`, `country`, `countryId`. JWT + `master.zone.read` or `master.zone.all`.
