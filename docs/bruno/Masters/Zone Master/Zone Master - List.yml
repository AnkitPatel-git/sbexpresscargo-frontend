info:
  name: Zone Master - List
  type: http
  seq: 1
  tags:
    - zone
    - list

http:
  method: GET
  url: "{{baseUrl}}/zone-master"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: sortBy
      value: code
      type: query
    - name: sortOrder
      value: asc
      type: query
    - name: zoneType
      value: DOMESTIC
      type: query
    - name: countryId
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

