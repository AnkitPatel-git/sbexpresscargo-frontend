info:
  name: Zones - Update
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/rate-master/zones/1"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "version": 1,
        "name": "Domestic Zone 1",
        "code": "DOM1",
        "countryId": 1,
        "zoneType": "DOMESTIC"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Update zone by id (`PATCH` or `PUT` same handler). JWT + master.zone.update.

  Required: `version` (current row version for optimistic locking).
  Optional partial: `name`, `code`, `countryId` (set to another active country, or `null` to clear FK), `zoneType`.
