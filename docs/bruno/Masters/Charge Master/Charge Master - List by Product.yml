info:
  name: Charge Master - List by Product
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/charge-master/by-product/{{productId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: productId
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/charge-master/by-product/1"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": true,
            "data": []
          }

docs: |-
  List all Charge Master entries associated with a specific product. JWT + charge_master_list or charge_master_all.

  Path param: productId (number) — ID of the product to filter charges by
  Response: array of charge records linked to the given product
