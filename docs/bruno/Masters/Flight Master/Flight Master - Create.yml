  url: "{{baseUrl}}/flight-master"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "flightCode": "FLT01",
        "flightName": "Prime Flight",
        "flightType": "prime"
      }
  auth: inherit

