  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/service-map-master/by-vendor/{{vendorId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: vendorId
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

