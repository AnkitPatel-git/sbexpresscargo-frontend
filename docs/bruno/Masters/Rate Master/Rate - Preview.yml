docs: |-
  Preview rate quote (same body as POST /rate-master/calculate). Full CalculateRateDto: customerId, serviceType, pickupPincode, deliveryPincode, weight, chargeableWeight (required); optional distanceKm, shipmentValue, dimensions, floor, bookDate.

  **distanceKm**: omit for **DISTANCE_MATRIX** to let the backend resolve road distance from pincodes (Nominatim + OSRM; haversine fallback). Use explicit `distanceKm` when you need a fixed test value (see distance-slab-test). ZONE_MATRIX / FLAT ignore distance.

  Examples cover zone matrix, distance slab (fixed km), distance auto-from-pincodes, percentage/min, ODA, same pincode, and missing slab validation.
