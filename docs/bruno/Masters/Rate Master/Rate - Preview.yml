info:
  name: Rate - Preview
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/rate/preview"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "customerId": 1,
        "serviceType": "EXPRESS",
        "pickupPincode": "400001",
        "deliveryPincode": "110001",
        "weight": 10,
        "chargeableWeight": 12,
        "shipmentValue": 5000,
        "dimensions": {
          "length": 30,
          "width": 20,
          "height": 15
        },
        "floor": 2,
        "bookDate": "2026-04-09"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

