info:
  name: Rate Master - Update
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/rate-master/1"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "version": 1,
        "updateType": "AWB_ENTRY_RATE",
        "fromDate": "2026-03-01",
        "toDate": "2026-03-31",
        "customerId": 1,
        "serviceType": "EXPRESS",
        "rateType": "ZONE_MATRIX",
        "zoneId": 1,
        "origin": "400001",
        "destination": "110001",
        "paymentType": "CREDIT",
        "zeroContract": false,
        "flatRate": 26.0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Update rate master by id. JWT + master.rate.update.

  Required: `version` (optimistic lock). Any other field is optional partial update—same shape as create (`updateType`, `fromDate`, `toDate`, `customerId`, `serviceType`, `rateType`, `zoneId`, `origin`, `destination`, `paymentType`, `zeroContract`, `flatRate`). String helpers `serviceCenter`, `customer`, `product`, `vendor` are not applied on update by the current service.
