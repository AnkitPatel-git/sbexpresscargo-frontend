info:
  name: Local Branch Master - Export (CSV)
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/local-branch-master/export"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/local-branch-master/export"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: text/csv
        - name: content-disposition
          value: 'attachment; filename="local-branches.csv"'
      body:
        type: text
        data: "(empty CSV — no local branch records to export)"

docs: |-
  Export all Local Branch Master records as a CSV file download. JWT + local_branch_master_list or local_branch_master_all.

  Response: text/csv download (Content-Disposition: attachment; filename="local-branches.csv")
  Optional query params: same filters as the List endpoint (search, sortBy, sortOrder, etc.)
