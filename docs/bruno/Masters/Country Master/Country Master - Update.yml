info:
  name: Country Master - Update
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/country-master/1"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "code": "IN",
        "name": "India Updated",
        "weightUnit": "KGS",
        "currency": "INR",
        "isdCode": "+91"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Country Master update by id. JWT + country_master_modify or country_master_all.

  Mandatory: (none - all optional for partial update)
  Optional: code, name, weightUnit, currency, isdCode
