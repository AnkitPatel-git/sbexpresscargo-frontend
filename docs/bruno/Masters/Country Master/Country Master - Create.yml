info:
  name: Country Master - Create
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/country-master"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "code": "IN",
        "name": "India",
        "weightUnit": "KGS",
        "currency": "INR",
        "isdCode": "+91"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

