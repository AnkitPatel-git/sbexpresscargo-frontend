http:
  method: POST
  url: "{{baseUrl}}/area-master"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "areaName": "Mumbai Central",
        "serviceCenterId": 1,
        "destination": "Mumbai"
      }
  auth: inherit

