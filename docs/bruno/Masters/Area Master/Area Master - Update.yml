info:
  name: Area Master - Update
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/area-master/1"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "areaName": "Mumbai Central Updated",
        "pinCodeId": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Area Master update by id. JWT + area_master_modify or area_master_all.

  Mandatory: (none - all optional for partial update)
  Optional: areaName, serviceCenterId, destination
