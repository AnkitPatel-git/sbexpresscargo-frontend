docs: |-
  Product Master create. JWT + product_master_add or product_master_all.

  Mandatory: productCode, productName, productType (import|local|international|domestic), fuelCharge, gstReverse, docType (DOX|NDOX), status (ACTIVE|INACTIVE), groupType (air|surface|train|all)
