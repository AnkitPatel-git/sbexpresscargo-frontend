docs:
  content: |-
    Full API collection. Set `baseUrl` (e.g. `http://localhost:3000/api` or your dev API). Run **Users → Login** first: the after-response script saves `accessToken` with `bru.setVar` for `Authorization: Bearer {{accessToken}}`. Paste a JWT into `accessToken` manually if you disable scripts. Login requires `platform`: `portal` or `mobile`.

    **Mobile** routes live under `/mobile/*`. Use **Mobile → Auth → Login (Mobile)** so `platform` is `mobile`; `MobilePlatformGuard` rejects portal tokens. User profile should have `mobileAppLens=true`.

    **List APIs** (portal) return paginated response: `{ success, message, data, total, page, limit, totalPages }`. Mobile endpoints return JSON bodies directly unless noted.

    **Dashboard** (`/dashboard/*`): Operation summary, sales summary (with daily series), and sales-by-service-center reports; requires `dashboard.core.read`. See folder **Dashboard**.

    Collection variables: `{{mobileAwbNo}}`, `{{mobileManifestId}}`, `{{mobileDrsId}}`, `{{mobileNotificationId}}`, `{{mobileAttendanceId}}` for mobile path params. Portal detail routes: `{{shipmentId}}`, `{{pickupId}}`, `{{drsId}}`.

    **Logistics vendors** (BlueDart, DTDC, etc.) use **Vendor Master** (`/vendor-master`), shipment **vendor-mapping**, tracking **vendor webhooks** (`vendorId` in body), and pickup **`vendorId`** — the separate Carrier Master API was removed in favor of a single vendor model.
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
