info:
  name: GET /api/mobile/event-scan
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/mobile/event-scan"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
      disabled: true
  params:
    - name: eventType
      value: string
      type: query
    - name: page
      value: "0"
      type: query
    - name: limit
      value: "0"
      type: query
    - name: date
      value: string
      type: query
    - name: serviceCenterId
      value: "0"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
