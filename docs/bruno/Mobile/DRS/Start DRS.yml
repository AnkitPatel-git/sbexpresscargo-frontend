info:
  name: Start DRS
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/mobile/drs/{{mobileDrsId}}/start"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "version": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.drs.update
