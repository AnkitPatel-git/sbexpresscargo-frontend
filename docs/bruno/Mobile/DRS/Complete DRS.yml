info:
  name: Complete DRS
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/mobile/drs/{{mobileDrsId}}/complete"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "version": 1,
        "items": [
          {
            "awbNo": "AWB001",
            "status": "DELIVERED",
            "receiverName": "Receiver"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.drs.update — must include every DRS AWB
