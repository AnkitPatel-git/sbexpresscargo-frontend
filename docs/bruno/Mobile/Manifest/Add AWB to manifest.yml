info:
  name: Add AWB to manifest
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/mobile/manifest/{{mobileManifestId}}/awb"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "awbNo": "AWB001"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.manifest.update
