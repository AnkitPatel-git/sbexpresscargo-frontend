info:
  name: Close manifest
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/mobile/manifest/{{mobileManifestId}}/close"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "version": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.manifest.update
