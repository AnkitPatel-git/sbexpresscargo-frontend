info:
  name: Today
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/mobile/attendance/today"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.attendance.read — current open shift or today’s row; canCheckIn / canCheckOut / autoCloseWarning
