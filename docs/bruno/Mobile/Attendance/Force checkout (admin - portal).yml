info:
  name: Force checkout (admin / portal)
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/mobile/attendance-admin/{{mobileAttendanceId}}/force-checkout"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "remarks": "Admin override"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.attendance.admin — use **Users → Login** (portal), not Mobile login. No MobilePlatformGuard.
