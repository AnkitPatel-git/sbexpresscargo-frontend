info:
  name: Month summary
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/mobile/attendance/month?year=2026&month=3"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "mobile.attendance.read — optional year, month (defaults IST current). SUPER_ADMIN: optional userId to query another user."
