info:
  name: List
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/mobile/notifications?page=1&limit=20&unreadOnly=false"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.notification.read — response always includes unreadCount
