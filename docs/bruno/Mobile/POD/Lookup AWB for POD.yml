info:
  name: Lookup AWB for POD
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/mobile/pod/awb/{{mobileAwbNo}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.pod.read
