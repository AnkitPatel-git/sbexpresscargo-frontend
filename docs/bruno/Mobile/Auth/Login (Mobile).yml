info:
  name: Login (Mobile)
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/utilities/users/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "superadmin@example.com",
        "password": "SuperAdmin123!",
        "platform": "mobile"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          const json = res.getBody();
          const token = json.data && json.data.accessToken;
        //   if (token) pm.collectionVariables.set("accessToken", token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Same as portal login but `platform` must be `mobile`. Saves token to {{accessToken}}.
