info:
  name: Create AWB
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/mobile/awb"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "productId": 1,
        "customerId": 1,
        "paymentType": "CASH",
        "origin": "MUM",
        "destination": "DEL",
        "declaredWeight": 1.5,
        "pieces": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.awb.create — minimal body; extend per MobileAwbCreateDto
