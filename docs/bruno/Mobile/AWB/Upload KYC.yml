info:
  name: Upload KYC
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/mobile/awb/{{mobileAwbNo}}/kyc"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: multipart-form
    data:
      - name: type
        type: text
        value: ID_PROOF
      - name: file
        type: file
        value: []
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.awb.update — multipart field `file`
