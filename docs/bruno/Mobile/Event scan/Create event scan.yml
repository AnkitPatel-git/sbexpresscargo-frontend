info:
  name: Create event scan
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/mobile/event-scan"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "eventType": "undelivered_received",
        "scanAt": "2026-03-20T10:00:00.000Z",
        "awbNos": ["AWB001"]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.event_scan.create
