info:
  name: List pickups
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/mobile/pickup?page=1&limit=20&status=ALL&search="
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "mobile.pickup.read — status: PENDING|DELIVERED|ALL; optional date, search"
