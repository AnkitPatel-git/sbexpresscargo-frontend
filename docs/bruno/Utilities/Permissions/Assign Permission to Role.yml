info:
  name: Assign Permission to Role
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/utilities/permissions/assign"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "roleId": 2,
        "permissionId": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Assign a permission to a role.

  Mandatory: roleId, permissionId
  Optional: (none)
