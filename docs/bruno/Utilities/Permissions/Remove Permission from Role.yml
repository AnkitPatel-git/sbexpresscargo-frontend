info:
  name: Remove Permission from Role
  type: http
  seq: 9

http:
  method: DELETE
  url: "{{baseUrl}}/utilities/permissions/remove"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "roleId": 2,
        "permissionId": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Remove a permission from a role.
