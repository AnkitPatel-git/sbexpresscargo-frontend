info:
  name: Change Password
  type: http
  seq: 12

http:
  method: POST
  url: "{{baseUrl}}/utilities/users/change-password"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "currentPassword": "Admin@123",
        "newPassword": "Admin@123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/utilities/users/change-password"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{accessToken}}
      body:
        type: json
        data: |-
          {
            "currentPassword": "Admin@123",
            "newPassword": "Admin@1234"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-security-policy
          value: "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data:;object-src 'none';script-src 'self';script-src-attr 'none';style-src 'self' https: 'unsafe-inline';upgrade-insecure-requests"
        - name: cross-origin-opener-policy
          value: same-origin
        - name: cross-origin-resource-policy
          value: same-origin
        - name: origin-agent-cluster
          value: ?1
        - name: referrer-policy
          value: no-referrer
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
        - name: x-content-type-options
          value: nosniff
        - name: x-dns-prefetch-control
          value: off
        - name: x-download-options
          value: noopen
        - name: x-frame-options
          value: SAMEORIGIN
        - name: x-permitted-cross-domain-policies
          value: none
        - name: x-xss-protection
          value: "0"
        - name: vary
          value: Origin
        - name: access-control-allow-credentials
          value: "true"
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "58"
        - name: etag
          value: W/"3a-q68W5NWhqX5poAtHZphYySdDRQ8"
        - name: date
          value: Thu, 09 Apr 2026 12:43:46 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Password changed successfully"
          }

docs: |-
  Change current logged-in user's password.

  Requires valid JWT.
  Existing sessions are invalidated after password change.
