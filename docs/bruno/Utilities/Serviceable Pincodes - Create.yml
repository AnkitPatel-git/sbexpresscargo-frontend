      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "pinCode": "486001",
        "pinCodeName": "REWA",
        "serviceCenterId": 1,
        "serviceCenterCode": "VASAI",
        "destination": "REWA",
        "serviceable": true,
        "oda": false
      }
  auth: inherit

