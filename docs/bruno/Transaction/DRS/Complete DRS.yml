info:
  name: Complete DRS
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/transaction/drs/complete"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "drsNo": "DRS001",
        "items": [
          {
            "awbNo": "AWB123456",
            "status": "DELIVERED",
            "remark": "Delivered to receiver",
            "receiverName": "John Doe",
            "podFilePath": "s3://bucket/pod/AWB123456.pdf"
          },
          {
            "awbNo": "AWB123457",
            "status": "FAILED",
            "remark": "Address not found"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{baseUrl}}/transaction/drs/complete"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{accessToken}}
      body:
        type: json
        data: |-
          {
            "drsNo": "DRS001",
            "items": [
              {
                "awbNo": "AWB123456",
                "status": "DELIVERED",
                "remark": "Delivered to receiver",
                "receiverName": "John Doe",
                "podFilePath": "s3://bucket/pod/AWB123456.pdf"
              },
              {
                "awbNo": "AWB123457",
                "status": "FAILED",
                "remark": "Address not found"
              }
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-security-policy
          value: "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data:;object-src 'none';script-src 'self';script-src-attr 'none';style-src 'self' https: 'unsafe-inline';upgrade-insecure-requests"
        - name: cross-origin-opener-policy
          value: same-origin
        - name: cross-origin-resource-policy
          value: same-origin
        - name: origin-agent-cluster
          value: ?1
        - name: referrer-policy
          value: no-referrer
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
        - name: x-content-type-options
          value: nosniff
        - name: x-dns-prefetch-control
          value: off
        - name: x-download-options
          value: noopen
        - name: x-frame-options
          value: SAMEORIGIN
        - name: x-permitted-cross-domain-policies
          value: none
        - name: x-xss-protection
          value: "0"
        - name: vary
          value: Origin
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "210"
        - name: etag
          value: W/"d2-LvRlbI6n26DxeY45s/hdIDNftso"
        - name: date
          value: Fri, 03 Apr 2026 08:49:00 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "data": {
              "drsNo": "DRS001",
              "total": 2,
              "succeeded": 1,
              "failed": 1,
              "results": [
                {
                  "awbNo": "AWB123456",
                  "ok": true,
                  "status": "DELIVERED"
                },
                {
                  "awbNo": "AWB123457",
                  "ok": false,
                  "error": "AWB not part of this DRS"
                }
              ]
            }
          }

docs: |-
  Complete DRS and mark AWBs DELIVERED/FAILED. JWT + drs_modify or drs_all.

  Mandatory: drsNo, items (each: awbNo, status DELIVERED|FAILED)
  Optional: items: remark, receiverName, podFilePath
