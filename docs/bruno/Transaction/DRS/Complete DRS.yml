info:
  name: Complete DRS
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/transaction/drs/complete"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "drsNo": "DRS001",
        "items": [
          {
            "awbNo": "AWB123456",
            "status": "DELIVERED",
            "remark": "Delivered to receiver",
            "receiverName": "John Doe",
            "podFilePath": "s3://bucket/pod/AWB123456.pdf"
          },
          {
            "awbNo": "AWB123457",
            "status": "FAILED",
            "remark": "Address not found"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Complete DRS and mark AWBs DELIVERED/FAILED. JWT + drs_modify or drs_all.

  Mandatory: drsNo, items (each: awbNo, status DELIVERED|FAILED)
  Optional: items: remark, receiverName, podFilePath
