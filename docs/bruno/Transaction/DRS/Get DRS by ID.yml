info:
  name: Get DRS by ID
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/transaction/drs/{{drsId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: DRS header with line items (AWB, customer name, weight, origin/destination) and courier/area context. JWT + drs_list/search/all. Set `drsId` in collection variables.
