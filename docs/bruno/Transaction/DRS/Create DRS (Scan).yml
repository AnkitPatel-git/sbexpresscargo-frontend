info:
  name: Create DRS (Scan)
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/transaction/drs/scan"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "drsNo": "DRS001",
        "drsDate": "2026-03-20",
        "drsTime": "10:00",
        "courierId": 1,
        "areaId": 1,
        "serviceCenter": "DELHI",
        "serviceCenterId": 1,
        "remark": "DRS for Delhi area",
        "items": [
          { "awbNo": "AWB123456", "shipmentId": 1 }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create DRS and assign shipments. JWT + drs_add or drs_all.

  Mandatory: drsNo, drsDate, items (each: awbNo)
  Optional: drsTime, courierId, areaId, serviceCenter, serviceCenterId, remark; items: shipmentId
