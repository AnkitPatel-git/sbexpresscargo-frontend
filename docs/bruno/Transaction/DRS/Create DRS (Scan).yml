docs: |-
  Create DRS and assign shipments. JWT + drs_add or drs_all.

  Mandatory: drsNo, drsDate, items (each: awbNo)
  Optional: drsTime, courierId, areaId, serviceCenterId, remark; items: shipmentId (optional; AWB resolves shipment)
