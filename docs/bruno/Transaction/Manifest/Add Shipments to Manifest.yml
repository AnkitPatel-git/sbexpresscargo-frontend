info:
  name: Add Shipments to Manifest
  type: http
  seq: 14

http:
  method: POST
  url: "{{baseUrl}}/transaction/manifest/1/shipments"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "version": 1,
        "shipmentIds": [2]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Attach shipments to manifest. JWT + manifest_modify or manifest_all.
