info:
  name: Get Available AWBs
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/transaction/manifest/available-awbs?page=1&limit=20"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: List AWBs eligible for manifest assignment. JWT + manifest_list or manifest_all.
