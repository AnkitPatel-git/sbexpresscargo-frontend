info:
  name: Add Manifest Progress
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/transaction/manifest/1/progress"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "bagNo": "BAG123",
        "progressDate": "2026-03-18",
        "serviceCenterId": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Add manifest progress row. JWT + manifest_modify or manifest_all.
