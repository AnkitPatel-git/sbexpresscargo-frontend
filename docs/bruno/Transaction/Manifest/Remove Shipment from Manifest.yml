info:
  name: Remove Shipment from Manifest
  type: http
  seq: 15

http:
  method: DELETE
  url: "{{baseUrl}}/transaction/manifest/1/shipments/2"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "version": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Detach shipment from manifest. JWT + manifest_modify or manifest_all.
