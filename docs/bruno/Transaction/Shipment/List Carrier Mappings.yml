docs: |-
  Returns all `ShipmentCarrierMapping` rows for the shipment (`shipment_carrier_mappings`): links your AWB to a **Carrier** (`carrierId`) with optional **externalAwb** / **externalOrderId** and booking API payloads.

  **Path:** `:id` — shipment id (not AWB string).

  **Response:** `data` is an array; each row includes nested `carrier` `{ id, code, name, isActive }`.

  Pairs with **Upsert Carrier Mapping** and **Tracking → Carrier webhook** (webhook uses your internal `awbNo` + `carrierId` + `externalStatus`; status mapping is in `CarrierStatusMapping` master).

  JWT + `shipment.core.read`
