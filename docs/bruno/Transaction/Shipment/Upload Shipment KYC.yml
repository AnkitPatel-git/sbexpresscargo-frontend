info:
  name: Upload Shipment KYC
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/transaction/shipment/{{shipmentId}}/kyc"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: multipartForm
    form:
      - name: type
        value: AADHAAR
      - name: entryType
        value: ID_PROOF
      - name: entryDate
        value: "2026-04-08"
      - name: file
        value: ""
        type: file
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "201"
    request:
      url: "{{baseUrl}}/transaction/shipment/{{shipmentId}}/kyc"
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
      body:
        type: multipartForm
        form:
          - name: type
            value: AADHAAR
          - name: entryType
            value: ID_PROOF
          - name: entryDate
            value: "2026-04-08"
          - name: file
            value: ""
            type: file
    response:
      status: 201
      statusText: Created
      body:
        type: json
        data: |-
          {
            "success": true,
            "data": {
              "shipmentId": 1,
              "awbNo": "AWB-20260408-000001",
              "kycDocumentId": 12,
              "type": "AADHAAR",
              "fileName": "aadhaar.jpg",
              "filePath": "shipment-kyc/AWB-20260408-000001/1712572820000_aadhaar.jpg"
            }
          }

docs: |-
  Upload one KYC document for a shipment. JWT + shipment.core.update.

  Mandatory: multipart `file`, `type`.
  Optional: `entryType`, `entryDate` (ISO date string).

  Notes:
  - One shipment can have multiple KYC documents (invoice photo, Aadhaar, PAN, etc.).
  - Max file size: 10 MB.
