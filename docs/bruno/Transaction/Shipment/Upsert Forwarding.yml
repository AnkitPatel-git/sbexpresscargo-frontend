info:
  name: Upsert Forwarding
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/transaction/shipment/1/forwarding"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "version": 1,
        "deliveryVendorId": 1,
        "deliveryServiceMapId": 10,
        "totalAmount": 500.0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create or update forwarding details with charges. JWT + shipment.core.update. Use deliveryVendorId first, then pick deliveryServiceMapId mapped to that vendor (dependent dropdown).
