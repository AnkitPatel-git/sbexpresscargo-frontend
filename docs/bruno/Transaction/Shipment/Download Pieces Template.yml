info:
  name: Download Pieces Template
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/transaction/shipment/pieces-template"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Download CSV template for shipment piece rows.

  Frontend can let users fill in Excel and then map rows to `piecesRows` in create/update shipment APIs.
