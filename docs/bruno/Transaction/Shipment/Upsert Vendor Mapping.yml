docs: |-
  Create or update the **unique** `(shipmentId, vendorId)` mapping (e.g. after booking with Blue Dart). Bumps shipment **version** (optimistic lock) like forwarding.

  **Path:** `:id` — shipment id.

  **Body — all fields**

  | Field | Required | Type | Notes |
  |-------|----------|------|-------|
  | version | **yes** | number | Current `Shipment.version` |
  | vendorId | **yes** | number | `Vendor` id (Vendor Master) |
  | externalAwb | no | string, max 128 | Partner waybill / consignment no. |
  | externalOrderId | no | string, max 128 | Partner order / booking id |
  | requestPayload | no | object | JSON — last booking request snapshot |
  | responsePayload | no | object | JSON — last booking response snapshot |
  | status | no | enum | `CREATED` \| `AWB_ASSIGNED` \| `FAILED` \| `RETRYING` \| `SYNCED` (default **CREATED** on insert) |
  | errorMessage | no | string, max 1000 | Last error text |

  **Partial update:** on existing row, omit fields you do not want to change (except `version` + `vendorId` always required).

  **Blocked** when shipment is `DELIVERED` or `FAILED`.

  JWT + `shipment.core.update`
