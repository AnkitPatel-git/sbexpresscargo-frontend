info:
  name: Tracking – Dead Letters
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/transaction/tracking/dead-letters?limit=100"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/transaction/tracking/dead-letters?limit=100"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Dead-letter logs retrieved successfully",
            "data": []
          }

docs: Dead-letter vendor tracking logs — unprocessable vendor webhook payloads. JWT + tracking_view or tracking_all.
