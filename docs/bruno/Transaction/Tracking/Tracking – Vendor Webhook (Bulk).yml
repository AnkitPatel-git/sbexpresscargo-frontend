info:
  name: Tracking – Vendor Webhook (Bulk)
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/transaction/tracking/webhook/bulk"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "events": [
          {
            "awbNo": "AWB123456",
            "vendorId": 1,
            "externalStatus": "PICKED_UP",
            "eventId": "bd-bulk-001",
            "sequence": 2,
            "location": "MUMBAI",
            "remarks": "Picked from shipper",
            "eventTime": "2026-03-18T08:00:00.000Z",
            "rawData": { "vehicle": "VH-01" }
          },
          {
            "awbNo": "AWB123457",
            "vendorId": 1,
            "externalStatus": "IN_TRANSIT",
            "eventId": "bd-bulk-002",
            "sequence": 3,
            "location": "HUB-DEL",
            "eventTime": "2026-03-19T12:00:00.000Z"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Public** bulk variant of **Vendor Webhook (Single)**. Same per-event fields as the single webhook (`awbNo`, `vendorId`, `externalStatus` required; `eventId`, `sequence`, `location`, `remarks`, `eventTime`, `rawData` optional).

  Response: `data.succeeded` / `data.failed` per index; `success` false if any event failed.

  Protect in production (signature / network controls).
