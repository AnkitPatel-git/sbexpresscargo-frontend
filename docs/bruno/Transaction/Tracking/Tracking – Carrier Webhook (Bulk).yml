        data: |-
          {
            "success": false,
            "message": "Bulk webhook processed with partial failures",
            "data": {
              "total": 2,
              "succeeded": [
                {
                  "index": 0,
                  "awbNo": "AWB123456",
                  "ok": true,
                  "result": {
                    "processed": false,
                    "reason": "NO_MAPPING"
