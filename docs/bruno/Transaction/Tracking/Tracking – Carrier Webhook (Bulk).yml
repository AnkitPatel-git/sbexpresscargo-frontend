docs: |-
  **Public** bulk variant of **Carrier Webhook (Single)**. Same per-event fields as the single webhook (`awbNo`, `carrierId`, `externalStatus` required; `eventId`, `sequence`, `location`, `remarks`, `eventTime`, `rawData` optional).

  Response: `data.succeeded` / `data.failed` per index; `success` false if any event failed.

  Protect in production (signature / network controls).
