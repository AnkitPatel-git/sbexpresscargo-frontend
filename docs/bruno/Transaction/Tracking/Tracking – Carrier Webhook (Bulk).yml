info:
  name: Tracking – Carrier Webhook (Bulk)
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/transaction/tracking/webhook/bulk"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "events": [
          {
            "awbNo": "AWB123456",
            "carrierId": 1,
            "externalStatus": "PICKED_UP",
            "eventId": "bd-bulk-001",
            "sequence": 2,
            "location": "MUMBAI",
            "remarks": "Picked from shipper",
            "eventTime": "2026-03-18T08:00:00.000Z",
            "rawData": { "vehicle": "VH-01" }
          },
          {
            "awbNo": "AWB123457",
            "carrierId": 1,
            "externalStatus": "IN_TRANSIT",
            "eventId": "bd-bulk-002",
            "sequence": 3,
            "location": "HUB-DEL",
            "eventTime": "2026-03-19T12:00:00.000Z"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{baseUrl}}/transaction/tracking/webhook/bulk"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "events": [
              {
                "awbNo": "AWB123456",
                "carrierId": 1,
                "externalStatus": "PICKED_UP",
                "eventId": "bd-bulk-001",
                "sequence": 2,
                "location": "MUMBAI",
                "remarks": "Picked from shipper",
                "eventTime": "2026-03-18T08:00:00.000Z",
                "rawData": { "vehicle": "VH-01" }
              },
              {
                "awbNo": "AWB123457",
