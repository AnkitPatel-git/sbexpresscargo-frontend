info:
  name: Create Vendor Tracking Log
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/transaction/vendor-tracking-logs"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "shipmentId": 1,
        "vendorId": 1,
        "status": "IN_TRANSIT",
        "eventId": "EVT-1001",
        "sequence": 1,
        "location": "Mumbai Hub",
        "remarks": "Shipment moved",
        "rawData": {
          "source": "vendor_webhook",
          "payload": "sample"
        },
        "isProcessed": false,
        "errorMessage": null,
        "retryCount": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
