info:
  name: Update Vendor Tracking Log
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/transaction/vendor-tracking-logs/{{vendorTrackingLogId}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "shipmentId": 1,
        "vendorId": 1,
        "status": "DELIVERED",
        "eventId": "EVT-1001",
        "sequence": 2,
        "location": "Destination",
        "remarks": "Delivered",
        "rawData": {
          "source": "manual_update"
        },
        "isProcessed": true,
        "errorMessage": null,
        "retryCount": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
