info:
  name: Update Pickup Status
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/transaction/pickup/3/status"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "version": 3,
        "status": "REQUESTED",
        "reason": "Confirmed by customer"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

