docs: |-
  Create pickup request. JWT + shipment.pickup.create.

  Mandatory: idempotencyKey, customerId, serviceCenterId, pickupType (INTERNAL|EXTERNAL)

  Optional (persisted on pickups row): bookingNo, carrierId, fieldExecutiveId, salesExecutiveId, pickupAt, pickupWindowStart, pickupWindowEnd (ISO 8601), origin, mobile, shipperName, contact, address1, address2, zipCode (maps to pin_code), city, state, payOption, consigneeId, consigneeName, consigneeDetails, vehicle, vehicleReq, area, specialInstructions, reason, pickupReady.

  Optional (request-only, not DB columns): fieldExecutive, salesExecutive, serviceCenter, pickupTime — prefer fieldExecutiveId, salesExecutiveId, serviceCenterId, and pickupAt / window for data that must round-trip.

  carrierId: FK to `carriers` (Carrier Master POST /carrier-master), not Courier Master (/courier-master). Seed creates code DEFAULT (usually id=1).
