http:
  method: GET
  url: "{{baseUrl}}/transaction/customer-payment?page=1&limit=20"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: List/search customer payments. JWT + customer_payment_list/search/all.
