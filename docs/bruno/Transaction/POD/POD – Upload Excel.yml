info:
  name: POD – Upload Excel
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/transaction/pod/upload"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value: &a1 []
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Upload Excel of AWBs and get POD rows. JWT + pod_upload or pod_all.
