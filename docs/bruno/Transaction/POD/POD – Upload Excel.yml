http:
  method: POST
  url: "{{baseUrl}}/transaction/pod/upload"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value: &a1 []
  auth: inherit

settings:
