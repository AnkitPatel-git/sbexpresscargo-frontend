info:
  name: List Receipts
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/transaction/receipt?page=1&limit=20&shipmentId=&receiptNo="
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: shipmentId
      value: ""
      type: query
    - name: receiptNo
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
