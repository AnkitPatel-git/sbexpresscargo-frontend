info:
  name: Create Credit Note
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/transaction/receipt-expenses/credit-note"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "noteNo": "CN001",
        "creditNoteNo": 1,
        "cnDate": "2026-03-20",
        "customerId": 1,
        "invoiceRef": "INV001",
        "narration": "Service issue adjustment",
        "gst": true,
        "amount": 450,
        "igst": 81,
        "sgst": 0,
        "cgst": 0,
        "totalAmount": 531,
        "grandTotal": 531,
        "serviceCenter": "VASAI",
        "serviceCenterId": 1,
        "items": [
          {
            "awbNo": "AWB123456",
            "destination": "DELHI",
            "product": "Express",
            "weight": 5,
            "pcs": 1,
            "remark": "Refund for delay",
            "amount": 450,
            "igst": 81,
            "sgst": 0,
            "cgst": 0,
            "total": 531
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create credit note. JWT + credit_note_add or credit_note_all.

  Mandatory: noteNo, cnDate, customerId, items (each: awbNo)
  Optional: creditNoteNo, invoiceRef, narration, gst, amount, igst, sgst, cgst, totalAmount, grandTotal, serviceCenterId, or serviceCenter (service center code) to resolve id; items: destination, product, weight, pcs, remark, amount, igst, sgst, cgst, total
