info:
  name: Post Credit Note (DRAFT → POSTED)
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/transaction/receipt-expenses/credit-note/1/post"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "version": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Transition credit note from DRAFT to POSTED. POSTED notes cannot be edited. JWT + credit_note_modify or credit_note_all.
