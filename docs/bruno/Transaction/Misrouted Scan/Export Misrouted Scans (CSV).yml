info:
  name: Export Misrouted Scans (CSV)
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/transaction/misrouted-scan/export"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{baseUrl}}/transaction/misrouted-scan/export"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-security-policy
          value: "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data:;object-src 'none';script-src 'self';script-src-attr 'none';style-src 'self' https: 'unsafe-inline';upgrade-insecure-requests"
        - name: cross-origin-opener-policy
          value: same-origin
        - name: cross-origin-resource-policy
          value: same-origin
        - name: origin-agent-cluster
          value: ?1
        - name: referrer-policy
          value: no-referrer
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
        - name: x-content-type-options
          value: nosniff
        - name: x-dns-prefetch-control
          value: off
        - name: x-download-options
          value: noopen
        - name: x-frame-options
          value: SAMEORIGIN
        - name: x-permitted-cross-domain-policies
          value: none
        - name: x-xss-protection
          value: "0"
        - name: vary
          value: Origin
        - name: content-type
          value: text/csv
        - name: content-disposition
          value: attachment; filename="misrouted-scans.csv"
        - name: date
          value: Wed, 25 Mar 2026 02:43:22 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
        - name: transfer-encoding
          value: chunked
      body:
        type: text
        data: |
          id,eventType,scanDate,scanTime,serviceCenter,count
          2,misrouted,,,,1

docs: Export misrouted scans as CSV. JWT + event_scan_list/search/all.
