info:
  name: Create Misrouted Scan
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/transaction/misrouted-scan"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "scanDate": "2026-03-20",
        "scanTime": "10:00",
        "serviceCenterId": 1,
        "items": [
          { "awbNo": "AWB123456" }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create misrouted scan. JWT + event_scan_add or event_scan_all.

  Mandatory: scanDate, items (each: awbNo)
  Optional: scanTime, serviceCenterId
