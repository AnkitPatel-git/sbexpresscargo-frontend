info:
  name: Logout
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/users/logout"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Invalidate current session. Requires valid JWT.
