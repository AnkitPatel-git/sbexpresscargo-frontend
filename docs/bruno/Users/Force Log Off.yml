info:
  name: Force Log Off
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/users/sessions/{{sessionId}}/logoff"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: End session by id. Set {{sessionId}}. JWT + logged_in_users_logoff or logged_in_users_all.
