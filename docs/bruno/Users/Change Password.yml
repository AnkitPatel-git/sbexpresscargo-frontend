info:
  name: Change Password
  type: http
  seq: 12

http:
  method: POST
  url: "{{baseUrl}}/users/change-password"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "currentPassword": "Admin@123",
        "newPassword": "Admin@1234"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{baseUrl}}/users/change-password"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{accessToken}}
      body:
        type: json
        data: |-
          {
            "currentPassword": "Admin@123",
            "newPassword": "Admin@1234"
          }
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Password changed successfully"
          }
  - name: "401"
    request:
      url: "{{baseUrl}}/users/change-password"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{accessToken}}
      body:
        type: json
        data: |-
          {
            "currentPassword": "wrong-password",
            "newPassword": "Admin@1234"
          }
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "Current password is incorrect",
            "data": {}
          }

docs: |-
  Change current logged-in user's password.

  Requires valid JWT.
  Existing sessions are invalidated after password change.
