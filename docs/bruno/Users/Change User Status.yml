info:
  name: Change User Status
  type: http
  seq: 10

http:
  method: PATCH
  url: "{{baseUrl}}/users/1/status"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "status": "INACTIVE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{baseUrl}}/users/1/status"
      method: PATCH
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{accessToken}}
      body:
        type: json
        data: |-
          {
            "status": "INACTIVE"
          }
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "User status updated successfully",
            "data": {
              "id": 1,
              "username": "admin",
              "email": "admin@system.com",
              "roleId": 1,
              "mobile": null,
              "status": "INACTIVE",
              "role": {
                "id": 1,
                "name": "Super Admin",
                "identifier": "SUPER_ADMIN",
                "description": "Super Admin"
              },
              "profile": null,
              "createdAt": "2026-03-21T06:20:20.400Z",
              "updatedAt": "2026-04-06T12:05:00.000Z"
            }
          }

docs: |-
  Admin activate/deactivate user account.

  Allowed values: ACTIVE, INACTIVE
  JWT + user_master_modify or user_master_all.
