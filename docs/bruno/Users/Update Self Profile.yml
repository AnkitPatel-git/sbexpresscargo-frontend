info:
  name: Update Self Profile
  type: http
  seq: 11

http:
  method: PUT
  url: "{{baseUrl}}/users/profile"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "username": "admin_self_updated",
        "email": "admin.self@example.com",
        "mobile": "9999999999",
        "profile": {
          "userGroup": "SELF",
          "origin": "MUMBAI",
          "groupName": "MY GROUP",
          "birthDate": "2024-01-10"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{baseUrl}}/users/profile"
      method: PUT
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{accessToken}}
      body:
        type: json
        data: |-
          {
            "username": "admin_self_updated",
            "email": "admin.self@example.com",
            "mobile": "9999999999",
            "profile": {
              "userGroup": "SELF",
              "origin": "MUMBAI",
              "groupName": "MY GROUP",
              "birthDate": "2024-01-10"
            }
          }
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Profile updated successfully",
            "data": {
              "id": 1,
              "username": "admin_self_updated",
              "email": "admin.self@example.com",
              "roleId": 1,
              "mobile": "9999999999",
              "status": "ACTIVE",
              "role": {
                "id": 1,
                "name": "Super Admin",
                "identifier": "SUPER_ADMIN",
                "description": "Super Admin"
              },
              "profile": {
                "id": 1,
                "userGroup": "SELF",
                "origin": "MUMBAI",
                "groupName": "MY GROUP",
                "birthDate": "2024-01-10T00:00:00.000Z"
              },
              "createdAt": "2026-03-21T06:20:20.400Z",
              "updatedAt": "2026-04-06T12:10:00.000Z"
            }
          }

docs: |-
  Update current logged-in user's own profile.

  Self-editable fields:
  - username
  - email
  - mobile
  - profile.userGroup
  - profile.origin
  - profile.groupName
  - profile.birthDate

  Requires valid JWT.
