info:
  name: List Users
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/users?page=1&limit=10&status=ACTIVE&search=admin"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{baseUrl}}/users?page=1&limit=10&status=ACTIVE&search=admin"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Users retrieved successfully",
            "data": [
              {
                "id": 1,
                "username": "admin",
                "email": "admin@system.com",
                "roleId": 1,
                "mobile": null,
                "status": "ACTIVE",
                "role": {
                  "id": 1,
                  "name": "Super Admin",
                  "identifier": "SUPER_ADMIN",
                  "description": "Super Admin"
                },
                "profile": null,
                "createdAt": "2026-03-21T06:20:20.400Z",
                "updatedAt": "2026-03-21T06:20:20.400Z"
              }
            ],
            "meta": {
              "page": 1,
              "limit": 10,
              "total": 1,
              "totalPages": 1
            }
          }

docs: |-
  Admin user list with pagination and filters.

  Query params:
  - page, limit
  - search
  - username
  - email
  - mobile
  - roleId
  - status

  JWT + user_master_list or user_master_all.
