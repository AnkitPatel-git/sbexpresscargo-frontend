info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/users/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "admin@system.com",
        "password": "Admin@123",
        "platform": "portal"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          const json = res.getBody();
          const token = json?.data?.accessToken;
          if (token) bru.setVar('accessToken', token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    description: happy flow
    request:
      url: "{{baseUrl}}/users/login"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "email": "admin@system.com",
            "password": "Admin@123",
            "platform": "portal"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: server
