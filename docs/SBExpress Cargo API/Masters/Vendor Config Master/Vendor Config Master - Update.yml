info:
  name: Vendor Config Master - Update
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/vendor-config-master/{{vendorConfigId}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "vendorId": 1,
        "mode": "API",
        "environment": "SANDBOX",
        "customerId": 1,
        "apiKey": "updated_api_key",
        "secretKey": "updated_secret_key",
        "baseUrl": "https://sandbox.vendor.example.com",
        "isActive": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
