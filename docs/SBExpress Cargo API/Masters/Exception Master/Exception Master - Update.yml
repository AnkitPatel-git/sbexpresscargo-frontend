info:
  name: Exception Master - Update
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/exception-master/1"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "code": "EXC01",
        "name": "Address Not Found Updated",
        "type": "UNDELIVERED",
        "inscan": true,
        "showOnMobileApps": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Exception Master update by id. JWT + exception_master_modify or exception_master_all.

  Mandatory: (none - all optional for partial update)
  Optional: code, name, type, inscan, showOnMobileApps
