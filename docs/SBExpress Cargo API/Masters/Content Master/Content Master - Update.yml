info:
  name: Content Master - Update
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/content-master/1"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "contentCode": "CNT01",
        "contentName": "General Cargo Updated",
        "hsnCode": "996511",
        "countryId": 1,
        "additionalField": "Extra metadata",
        "clearanceCethNo": "CETH-001",
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Content Master update by id. JWT + content_master_modify or content_master_all.

  Mandatory: (none - all optional for partial update)
  Optional: contentCode, contentName, hsnCode, vendorId, countryId, additionalField, clearanceCethNo, notificationSubType, notificationSubType1, notificationNo, srNo, igstNotification, igstSrNo, igstcNotification, igstcSrNo. Response includes nested vendor, country, and createdBy (user fields without password).
