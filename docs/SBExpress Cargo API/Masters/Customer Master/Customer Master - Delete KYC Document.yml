info:
  name: Customer Master - Delete KYC Document
  type: http
  seq: 11

http:
  method: DELETE
  url: "{{baseUrl}}/customer-master/{{customerId}}/kyc-documents/{{docId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Delete a KYC document from a specific customer. JWT + customer_master_delete or customer_master_all.

  Path params: customerId (number), docId (number)
  Response: 200 on success
