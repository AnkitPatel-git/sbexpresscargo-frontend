info:
  name: Customer Master - KYC Customers List
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/customer-master/kyc/customers"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: search
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/customer-master/kyc/customers?page=1&limit=20"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": true,
            "data": [],
            "meta": {
              "page": 1,
              "limit": 20,
              "total": 0,
              "totalPages": 1
            }
          }
  - name: example (1)
    request:
      url: "{{baseUrl}}/customer-master/kyc/customers"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
      params:
        - name: page
          value: "1"
          type: query
        - name: limit
          value: "20"
          type: query
        - name: search
          value: ""
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-security-policy
          value: "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data:;object-src 'none';script-src 'self';script-src-attr 'none';style-src 'self' https: 'unsafe-inline';upgrade-insecure-requests"
        - name: cross-origin-opener-policy
          value: same-origin
        - name: cross-origin-resource-policy
          value: same-origin
        - name: origin-agent-cluster
          value: ?1
        - name: referrer-policy
          value: no-referrer
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
        - name: x-content-type-options
          value: nosniff
        - name: x-dns-prefetch-control
