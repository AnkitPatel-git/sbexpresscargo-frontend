info:
  name: Serviceable Pincodes - Export (CSV)
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/utilities/serviceable-pincodes/export"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/utilities/serviceable-pincodes/export"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: text/csv
        - name: content-disposition
          value: 'attachment; filename="serviceable-pincodes.csv"'
      body:
        type: text
        data: "(empty CSV — no serviceable pincode records to export)"

docs: |-
  Export all Serviceable Pincodes as a CSV file download.
  Domain ownership is under Master module; endpoint path remains `/utilities/serviceable-pincodes` for backward compatibility.
  JWT required.

  Response: text/csv download (Content-Disposition: attachment; filename="serviceable-pincodes.csv")
  Optional query params: same filters as the List endpoint (search, sortBy, sortOrder, etc.)
