info:
  name: Invoice Preview
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/document/invoice/preview"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "year": "2026",
        "fromDate": "2026-03-01",
        "toDate": "2026-03-31",
        "productType": "DOMESTIC",
        "serviceCenterId": 1,
        "billingType": "standard",
        "registerType": "REGISTERED",
        "customerId": 1,
        "showAwb": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Preview invoice aggregation by customer (no persistence). JWT + invoice.core.read.

  Mandatory: year, fromDate, toDate
  Optional: productType (DOMESTIC|INTERNATIONAL), serviceCenterId, billingType, registerType (Registered|Unregistered), customerId, showAwb
