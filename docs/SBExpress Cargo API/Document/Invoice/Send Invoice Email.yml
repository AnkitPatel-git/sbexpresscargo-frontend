info:
  name: Send Invoice Email
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/document/invoice/send-email"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "fromDate": "2026-03-01",
        "toDate": "2026-03-31",
        "serviceCenterId": 1,
        "productType": "DOMESTIC",
        "invoiceFormat": "standard",
        "customerId": 1,
        "invoiceStatus": "DRAFT",
        "year": "2026",
        "invoiceMessage": "Thank you for your business",
        "pendingEmailOnly": false,
        "senderSmtp": "smtp.example.com",
        "smtpPort": 587,
        "senderUserId": "user",
        "password": "pass",
        "senderEmailId": "billing@example.com",
        "additionalCc": "accounts@example.com",
        "invalidEmailFallbackTo": "admin@example.com",
        "sendInvoiceEmail": true,
        "sendInvoiceAckEmail": false,
        "ssl": false,
        "emailDocument": "pdf"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Send invoice by email. Uses PrintInvoiceDto filters + email options. JWT + invoice.core.create.

  Mandatory: (none - use filters to select invoices)
  Optional: fromDate, toDate, serviceCenterId, productType, invoiceFormat, customerId, invoiceStatus, year, invoiceMessage, pendingEmailOnly; Email: senderSmtp, smtpPort, senderUserId, password, senderEmailId, additionalCc, invalidEmailFallbackTo, sendInvoiceEmail, sendInvoiceAckEmail, ssl, emailDocument
