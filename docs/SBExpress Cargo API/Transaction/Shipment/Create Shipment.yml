settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create shipment AWB. JWT + shipment.core.create.

  Mandatory: bookDate, customerId or clientId, origin, destination, paymentType, one positive weight value (actualWeight or volumetricWeight or chargeWeight), and shipper/consignee via id or nested details.
  Optional: awbNo (if omitted, backend auto-generates a value like AWB-YYYYMMDD-000001), productId, serviceType, pickupPincode, deliveryPincode, shipmentValue, currency, pieces, km (manual override only; omit for typical booking), commercial, content, instruction, fieldExecutiveId, cashReceiptNo, amountReceived, balanceAmount, cashReceiptDate, contractCharges, otherCharges, subTotal, totalFuel, igst, cgst, sgst, totalAmount, oda, medicalCharges, manifestNo, manifestDate, invoiceNo, debitNoteNo, creditNoteNo, flightNo, podUserId, isCod, codAmount, piecesRows, charges.

  Nested **shipper** / **consignee** (when creating new party inline): `shipperCode` and `consignee.code` are optional; if omitted when a new row is created, backend assigns `SHP` / `CNE` + numeric suffix (same scheme as Shipper/Consignee masters). Optional display fields: `shipper.shipperOrigin`, `consignee.destination`.

  Rating behavior: when `charges` is omitted/empty, backend runs `RateEngineService` and persists `rateMasterId`, `baseFreight`, `totalAmount`, and autogenerated ShipmentCharge rows. For auto-rate, `pickupPincode` and `deliveryPincode` are required. If the active contract is **DISTANCE_MATRIX** and `km` is omitted, distance is resolved from those pincodes (Nominatim geocode + OSRM driving distance, haversine fallback). ZONE_MATRIX / FLAT contracts do not call external distance APIs.
  Response: created shipment always returns the final AWB in data.awbNo, including when backend auto-generates it.
  Note: serviceCenterId is not stored on Shipment. If shipper is mapped to a service center, keep that relation on the shipper master.
