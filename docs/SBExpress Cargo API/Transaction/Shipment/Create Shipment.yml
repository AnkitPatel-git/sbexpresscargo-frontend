        "originCode": "MUM",
        "destination": "DELHI",
        "destinationCode": "DEL",
        "productId": 1,
        "serviceType": "EXPRESS",
        "pickupPincode": "400001",
        "deliveryPincode": "110001",
        "shipmentValue": 5000,
        "currency": "INR",
        "pieces": 1,
        "actualWeight": 4.5,
        "volumetricWeight": 5.2,
        "chargeWeight": 5,
        "commercial": false,
        "paymentType": "CREDIT",
        "content": "Documents",
        "instruction": "Handle with care",
        "fieldExecutiveId": null,
        "shipper": {
          "shipperName": "ABC Exporters",
          "shipperOrigin": "VASAI",
          "mobile": "9999999999",
          "address1": "Vasai East"
        },
        "consignee": {
          "name": "XYZ Imports",
          "destination": "DELHI",
          "mobile": "8888888888",
          "address1": "Karol Bagh"
        },
        "cashReceiptNo": 1001,
