info:
  name: Create Shipment
  type: http
  seq: 1

http:
  method: POST
  url: '{{baseUrl}}/transaction/shipment'
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "awbNo": "AWB123456",
        "bookDate": "2026-03-20",
        "bookTime": "10:30",
        "referenceNo": "REF001",
