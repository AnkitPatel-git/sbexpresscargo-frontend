        "igst": 85.5,
        "cgst": 0,
        "sgst": 0,
        "totalAmount": 560.5,
        "oda": false,
        "medicalCharges": 0,
        "manifestNo": "CD12345",
        "manifestDate": "2026-03-20",
        "invoiceNo": "INV001",
        "debitNoteNo": "DN001",
        "creditNoteNo": "CN001",
        "flightNo": "6E123",
        "podUserId": "POD001",
        "isCod": false,
        "codAmount": 0,
        "piecesRows": [
          {
            "childAwbNo": "AWB123456-1",
