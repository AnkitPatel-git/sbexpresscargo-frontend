info:
  name: List Shipments
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/transaction/shipment?page=1&limit=20&sortBy=id&sortOrder=desc&search="
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: sortBy
      value: id
      type: query
    - name: sortOrder
      value: desc
      type: query
    - name: search
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  List/search shipments. JWT + shipment.core.read.

  Response now returns full shipment details for each row (relations + child collections), while still paginated.
