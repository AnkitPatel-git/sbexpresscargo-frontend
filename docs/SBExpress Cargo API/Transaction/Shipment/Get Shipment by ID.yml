info:
  name: Get Shipment by ID
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/transaction/shipment/{{shipmentId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Full shipment detail (masters, pieces, charges, statuses, single forwarding object, tracking summary, etc.). JWT + shipment.core.read. Same RBAC as list (e.g. customer scope). Set `shipmentId` in collection variables.
