info:
  name: Update Customer Payment
  type: http
  seq: 5

http:
  method: PUT
  url: "{{baseUrl}}/transaction/customer-payment/1"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: multipart-form
    data:
      - name: date
        type: text
        value: 2026-03-20
      - name: paidDate
        type: text
        value: 2026-03-21
      - name: amount
        type: text
        value: "1000.00"
      - name: customerId
        type: text
        value: "1"
      - name: invoiceNo
        type: text
        value: INV-0001
      - name: remark
        type: text
        value: Updated remark
      - name: approved
        type: text
        value: "true"
      - name: file
        type: file
        value: &a1
          - /Users/ankitkumarpatel/Downloads/_Invoice_Guardian Healthcare_916c0 (1).pdf
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Update customer payment (and optionally file). JWT + customer_payment_modify or customer_payment_all.

  Mandatory: (none - all optional for partial update)
  Optional: date, paidDate, amount, customerId, invoiceNo, remark, approved, file
