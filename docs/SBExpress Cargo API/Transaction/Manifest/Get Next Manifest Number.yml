info:
  name: Get Next Manifest Number
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/transaction/manifest/next-number?serviceCenterId=1"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/transaction/manifest/next-number"
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{accessToken}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Next manifest number retrieved successfully",
            "data": "MFT-null-000001"
          }

docs: Suggest next manifest number for service center. JWT + manifest_list or manifest_all.
