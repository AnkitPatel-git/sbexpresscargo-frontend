info:
  name: Create Manifest Inscan
  type: http
  seq: 17

http:
  method: POST
  url: "{{baseUrl}}/transaction/manifest/inscan"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "bagOrManifestAwbNo": "BAG123",
        "inscanDate": "2026-03-20",
        "inscanTime": "14:00",
        "serviceCenter": "VASAI",
        "serviceCenterId":1,
        "manifestId": 1,
        "bagNo": "BAG123",
        "items": [
          {
            "manifestNo": "CD12345",
            "bagNo": "BAG123",
            "awbNo": "AWB123456",
            "pieces": 1,
            "weight": 5.2,
            "manifestItemId": 1,
            "shipmentId": 1
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create manifest inscan record. JWT + manifest_add or manifest_all.

  Mandatory: inscanDate, items (each: awbNo)
  Optional: bagOrManifestAwbNo, inscanTime, serviceCenter, manifestId, bagNo; items: manifestNo, bagNo, pieces, weight, manifestItemId, shipmentId
