info:
  name: Create AWB
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/mobile/awb"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "productId": 1,
        "pieces": 1,
        "isCod": false,
        "codAmount": 0,
        "vendorId": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

