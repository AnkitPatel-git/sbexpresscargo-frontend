info:
  name: Mark all read
  type: http
  seq: 1

http:
  method: PATCH
  url: "{{baseUrl}}/mobile/notifications/read-all"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.notification.read
