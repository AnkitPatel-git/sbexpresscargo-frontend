http:
  method: GET
  url: "{{baseUrl}}/mobile/manifest/{{mobileManifestId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.manifest.read
