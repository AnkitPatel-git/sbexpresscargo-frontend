info:
  name: Create manifest
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/mobile/manifest"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "manifestNo": "MNF-001",
        "masterAwbNo": "MAWB-001",
        "manifestDate": "2026-03-20",
        "location": "MUMBAI",
        "serviceCenterId": 1,
        "connectStation": "DELHI",
        "vendorId": 1,
        "productId": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: mobile.manifest.create
